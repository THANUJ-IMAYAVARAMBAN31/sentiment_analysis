<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
</head>

<body>

<h1>Sentiment Analysis</h1>

<form method="POST">

<textarea
name="review"
rows="8"
cols="80"
placeholder="Enter a sentences here">
</textarea>

<br><br>

<button type="submit">
Predict
</button>

</form>

{% if result %}

<h2>
Prediction:
{{ result.sentiment }}
</h2>

<p>
Confidence:
{{ result.confidence }}%
</p>

{% endif %}

</body>
</html>
